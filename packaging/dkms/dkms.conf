# DKMS config for the RK3588 vendor MPP codec + RGA 2D accelerator.
# Builds two modules from the staged vendor source against the running kernel,
# and rebuilds them automatically on every kernel update.
PACKAGE_NAME="rk3588-vcodec"
PACKAGE_VERSION="1.0"

# (0) rk_vcodec.ko — MPP service framework: VEPU580 encoder + VDPU381 decoder.
BUILT_MODULE_NAME[0]="rk_vcodec"
BUILT_MODULE_LOCATION[0]="mpp"
DEST_MODULE_LOCATION[0]="/updates/dkms"

# (1) rga3.ko — RGA3 x2 + RGA2 2D accelerator.
BUILT_MODULE_NAME[1]="rga3"
BUILT_MODULE_LOCATION[1]="rga3"
DEST_MODULE_LOCATION[1]="/updates/dkms"

# One top-level Kbuild (obj-m += mpp/ rga3/) drives both module subdirs.
MAKE[0]="make -C \"${kernel_source_dir}\" M=\"${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build\" modules"
CLEAN="make -C \"${kernel_source_dir}\" M=\"${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build\" clean"

AUTOINSTALL="yes"
